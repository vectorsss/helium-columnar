name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Smoke check: feature gating is sound — default-features-off must compile.
      # Doesn't run tests because most are gated on schema-* / arrow / datafusion.
      - name: cargo build --no-default-features
        run: cargo build --no-default-features --verbose

      # Full test suite. --all-features pulls in datafusion + arrow + every
      # schema adapter; this is the gating bar referenced in CLAUDE.md.
      - name: cargo test --all-features
        run: cargo test --all-features --verbose

      # Clippy with -D warnings on every target. Matches the project's
      # acceptance bar from CLAUDE.md.
      - name: cargo clippy --all-targets --all-features
        run: cargo clippy --all-targets --all-features -- -D warnings

  bindings:
    name: Bindings (python + duckdb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + binding targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            duckdb/target
            python/target
          key: ${{ runner.os }}-bindings-${{ hashFiles('duckdb/Cargo.toml', 'python/Cargo.toml', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-bindings-

      # The duckdb extension is a separate crate (path-dep on helium-columnar).
      # A compile gate catches the kind of breakage that the crate rename and
      # the Dict* removal caused; the full load-into-DuckDB smoke is run locally
      # via duckdb/smoke.sh. duckdb-rs needs libclang for its bindgen build.
      - name: Install libclang (duckdb-rs bindgen)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Build duckdb extension
        run: cargo build --locked --manifest-path duckdb/Cargo.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # pyhelium: build the wheel with maturin, install it, run its test suite.
      - name: Build + test pyhelium
        run: |
          python -m pip install --upgrade pip
          # pyarrow + pandas are needed for the Arrow / pandas interop tests
          # (write_table / read_table). numpy covers the codec + flat-dict API.
          pip install maturin pytest numpy pyarrow pandas
          maturin build --manifest-path python/Cargo.toml --out python/dist
          pip install --no-index --find-links python/dist pyhelium
          python -m pytest python/tests -q

  format-comparison-report:
    name: Cross-format comparison report
    runs-on: ubuntu-latest
    # Run only when explicitly requested — the report is informational and
    # downloads/builds the parquet + apache-avro deps which take longer.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-latest-cargo-report-${{ hashFiles('**/Cargo.lock') }}
      - name: Run format-comparison report (synthetic dataset)
        run: cargo test --test format_comparison_report --release --all-features -- --nocapture
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: format-comparison-report
          path: target/format-comparison.md
